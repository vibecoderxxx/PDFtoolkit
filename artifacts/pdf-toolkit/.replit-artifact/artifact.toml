kind = "web"
previewPath = "/"
title = "PDF Toolkit"
version = "1.0.0"
id = "artifacts/pdf-toolkit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20254

[services.development]
run = "pnpm --filter @workspace/pdf-toolkit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdf-toolkit", "run", "build" ]
publicDir = "artifacts/pdf-toolkit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20254"
BASE_PATH = "/"
